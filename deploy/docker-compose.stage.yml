services:
  backend:
    volumes:
      - ../backend:/app
      - backend-data:/var/lib/app/data
    ports:
      - "${BACKEND_PORT:-8000}:80"

  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  rabbitmq:
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
