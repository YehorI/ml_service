services:
  postgres:
    image: postgres:16.0-bookworm
    user: 0:0
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_DB: ${POSTGRES_DB:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Passw0rd}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure
    networks:
      - ml_network

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-Passw0rd}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure
    networks:
      - ml_network

  backend:
    image: ml-service-backend:latest
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../backend/.env
    volumes:
      - backend-data:/var/lib/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure
    networks:
      - ml_network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  backend-data:
  postgres-data:
  rabbitmq-data:
  hf-cache:

networks:
  ml_network:
    driver: bridge
